name: Update contribution map

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution map
        run: python scripts/generate_contribution_map.py

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/contribution-map.svg; then
            echo "No contribution map changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-map.svg
          git commit -m "Update contribution map"
          git push
